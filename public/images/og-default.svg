<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>
    <radialGradient id="radial" cx="25%" cy="50%" r="60%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="radial2" cx="80%" cy="50%" r="45%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#radial)"/>
  <rect width="1200" height="630" fill="url(#radial2)"/>

  <!-- Grid lines -->
  <g stroke="#6366f1" stroke-opacity="0.05" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Accent bar left -->
  <rect x="0" y="0" width="4" height="630" fill="#6366f1" opacity="0.7"/>

  <!-- Decorative circles -->
  <circle cx="1020" cy="315" r="260" fill="none" stroke="#6366f1" stroke-opacity="0.07" stroke-width="1"/>
  <circle cx="1020" cy="315" r="180" fill="none" stroke="#6366f1" stroke-opacity="0.06" stroke-width="1"/>
  <circle cx="1020" cy="315" r="100" fill="none" stroke="#6366f1" stroke-opacity="0.08" stroke-width="1"/>
  <circle cx="1020" cy="315" r="8" fill="#6366f1" opacity="0.35"/>

  <!-- Domain -->
  <text x="60" y="96" font-family="monospace" font-size="14" fill="#6366f1" opacity="0.55" letter-spacing="3">monfort.pro</text>

  <!-- Separator line -->
  <rect x="60" y="116" width="48" height="2" fill="#6366f1" opacity="0.6"/>

  <!-- Name -->
  <text x="60" y="290" font-family="Georgia, serif" font-size="72" font-weight="700" fill="#ffffff" letter-spacing="-1">Stéphane Monfort</text>

  <!-- Title -->
  <text x="60" y="355" font-family="Arial, sans-serif" font-size="28" fill="#a5b4fc" letter-spacing="0.5">CTO &amp; Architecte Cloud Senior Freelance</text>

  <!-- Divider -->
  <rect x="60" y="390" width="600" height="1" fill="#ffffff" opacity="0.08"/>

  <!-- Tags -->
  <rect x="60" y="414" width="82" height="30" rx="15" fill="#6366f1" fill-opacity="0.15" stroke="#6366f1" stroke-opacity="0.3" stroke-width="1"/>
  <text x="101" y="434" font-family="Arial, sans-serif" font-size="13" fill="#a5b4fc" text-anchor="middle">AWS</text>

  <rect x="156" y="414" width="100" height="30" rx="15" fill="#6366f1" fill-opacity="0.15" stroke="#6366f1" stroke-opacity="0.3" stroke-width="1"/>
  <text x="206" y="434" font-family="Arial, sans-serif" font-size="13" fill="#a5b4fc" text-anchor="middle">TOGAF 9.1</text>

  <rect x="270" y="414" width="110" height="30" rx="15" fill="#6366f1" fill-opacity="0.15" stroke="#6366f1" stroke-opacity="0.3" stroke-width="1"/>
  <text x="325" y="434" font-family="Arial, sans-serif" font-size="13" fill="#a5b4fc" text-anchor="middle">Kubernetes</text>

  <rect x="394" y="414" width="82" height="30" rx="15" fill="#6366f1" fill-opacity="0.15" stroke="#6366f1" stroke-opacity="0.3" stroke-width="1"/>
  <text x="435" y="434" font-family="Arial, sans-serif" font-size="13" fill="#a5b4fc" text-anchor="middle">Terraform</text>

  <!-- Bottom line -->
  <rect x="60" y="530" width="1080" height="1" fill="#ffffff" opacity="0.05"/>
  <text x="60" y="558" font-family="Arial, sans-serif" font-size="13" fill="#6b7280" letter-spacing="1">18 ans d'expérience · Cloud · Architecture SI · Tech Leadership</text>
</svg>
