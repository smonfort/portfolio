<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
  </defs>

  <!-- Hexagon background -->
  <polygon
    points="64,8 112,36 112,92 64,120 16,92 16,36"
    fill="url(#grad)"
  />

  <!-- Inner hexagon outline -->
  <polygon
    points="64,18 104,41 104,87 64,110 24,87 24,41"
    fill="none"
    stroke="rgba(255,255,255,0.15)"
    stroke-width="1.5"
  />

  <!-- Circuit node dots -->
  <circle cx="64" cy="18" r="3" fill="rgba(255,255,255,0.5)"/>
  <circle cx="104" cy="41" r="3" fill="rgba(255,255,255,0.5)"/>
  <circle cx="104" cy="87" r="3" fill="rgba(255,255,255,0.5)"/>
  <circle cx="64" cy="110" r="3" fill="rgba(255,255,255,0.5)"/>
  <circle cx="24" cy="87" r="3" fill="rgba(255,255,255,0.5)"/>
  <circle cx="24" cy="41" r="3" fill="rgba(255,255,255,0.5)"/>

  <!-- Letters SM -->
  <text
    x="64"
    y="74"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="38"
    font-weight="800"
    fill="white"
    text-anchor="middle"
    letter-spacing="-2"
  >SM</text>
</svg>
